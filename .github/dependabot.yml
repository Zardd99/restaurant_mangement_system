version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch only safe (minor/patch) updates. Major bumps come as individual
      # PRs so breaking upgrades (e.g. MUI v7 -> v9) can be migrated deliberately.
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
