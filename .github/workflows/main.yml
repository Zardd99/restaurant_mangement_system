# The name of the workflow as it appears in the Actions tab
name: CI Build and Test

# Controls when the workflow will run
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# A workflow run is made up of one or more jobs
jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      # 1. Pulls your code from the repository onto the runner
      - name: Checkout code
        uses: actions/checkout@v7

      # 2. Sets up the environment (e.g., Node.js)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"

      # 3. Install dependencies (.npmrc pins legacy-peer-deps for ERESOLVE)
      - name: Install dependencies
        run: npm install

      # 4. Run tests or build commands
      - name: Run Tests
        run: npm test

      - name: Build Application
        run: npm run build

      # Deploy only on push to main. PRs (incl. Dependabot) get no secrets,
      # and Vercel's own Git integration already builds PR previews.
      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install --global vercel@latest
          vercel --token "$VERCEL_TOKEN" --prod --yes
